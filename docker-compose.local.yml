services:
  postgres:
    image: bitnami/postgresql:16
    environment:
      POSTGRESQL_USERNAME: civitas
      POSTGRESQL_PASSWORD: civitas-local
      POSTGRESQL_DATABASE: civitas
    ports:
      - "5432:5432"
    volumes:
      - civitas_postgres_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civitas -d civitas"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - civitas_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  civitas_postgres_data:
  civitas_redis_data:
