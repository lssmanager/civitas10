services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-civitas}
      POSTGRES_USER: ${POSTGRES_USER:-civitas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civitas}
    ports:
      - "5432:5432"
    volumes:
      - civitas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-civitas} -d $${POSTGRES_DB:-civitas}"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - civitas_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  civitas_postgres_data:
  civitas_redis_data:
