services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run worker
    env_file:
      - ./backend/.env
    ports:
      - "3002:3002"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_LOGTO_ENDPOINT: ${VITE_LOGTO_ENDPOINT}
        VITE_LOGTO_APP_ID: ${VITE_LOGTO_APP_ID}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_API_RESOURCE_INDICATOR: ${VITE_API_RESOURCE_INDICATOR}
        VITE_APP_REDIRECT_URI: ${VITE_APP_REDIRECT_URI}
        VITE_APP_SIGNOUT_REDIRECT_URI: ${VITE_APP_SIGNOUT_REDIRECT_URI}
    ports:
      - "4173:4173"
    depends_on:
      - backend
    restart: unless-stopped
