services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_LOGTO_ENDPOINT: ${VITE_LOGTO_ENDPOINT:-http://localhost:3001}
        VITE_LOGTO_APP_ID: ${VITE_LOGTO_APP_ID:-<YOUR_LOGTO_APP_ID>}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
        VITE_API_RESOURCE_INDICATOR: ${VITE_API_RESOURCE_INDICATOR:-https://api.documind.com}
        VITE_APP_REDIRECT_URI: ${VITE_APP_REDIRECT_URI:-http://localhost:4173/callback}
        VITE_APP_SIGNOUT_REDIRECT_URI: ${VITE_APP_SIGNOUT_REDIRECT_URI:-http://localhost:4173/}
    ports:
      - "4173:4173"
    depends_on:
      - backend
    restart: unless-stopped
