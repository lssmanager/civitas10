name: Authorization Contract

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: authorization-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canonical-authorization-security-gate:
    name: Canonical authorization security gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install root dependencies
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f package-lock.json ]]; then
            echo "::notice::Installing root dependencies with npm ci."
            npm ci
          else
            echo "::notice::No root package-lock.json; using npm install without generating a lockfile."
            npm install --package-lock=false
          fi

      - name: Validate authorization workflow scripts
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const scripts = require('./package.json').scripts || {};

          const requiredScripts = [
            'modules:catalog:check',
            'modules:p3-005:check',
            'modules:p3-005:postgres-check',
            'modules:p3-006:check',
            'modules:p3-006:postgres-check',
            'modules:p3-006:resilience-check',
            'integration:p3-010:check',
            'integration:p3-010:postgres-check',
            'integration:p3-010:resilience-check',
            'integration:p3-010:redaction-check',
            'integration:p3-010:no-parallel-outbox-check',
            'integration:p3-010:operation-contract-check',
            'authz:permission-catalog:check',
            'authz:role-model:check',
            'authz:policy-contract-check',
            'authz:data-scope-contract-check',
            'authz:data-scope-migration-check',
            'logto:authz:contract-check',
            'authz:security-gate:check',
            'authz:runtime-contract-check',
            'test',
          ];

          const missingScripts = requiredScripts.filter(
            (scriptName) => !scripts[scriptName],
          );

          if (missingScripts.length > 0) {
            console.error(
              `Missing required package scripts: ${missingScripts.join(', ')}`,
            );
            process.exit(1);
          }

          console.log('All required authorization workflow scripts exist.');
          NODE

      - name: Validate module catalog v2 offline
        run: npm run modules:catalog:check

      - name: Validate module lifecycle runtime bindings offline
        run: npm run modules:p3-005:check

      - name: Validate module availability contracts offline
        run: npm run modules:p3-006:check

      - name: Validate module availability resilience contracts
        run: npm run modules:p3-006:resilience-check

      - name: Validate integration events contracts
        run: npm run integration:p3-010:check

      - name: Validate integration events resilience
        run: npm run integration:p3-010:resilience-check

      - name: Validate integration events redaction
        run: npm run integration:p3-010:redaction-check

      - name: Validate single shared outbox foundation
        run: npm run integration:p3-010:no-parallel-outbox-check

      - name: Validate operation resource contract
        run: npm run integration:p3-010:operation-contract-check

      - name: Validate canonical permission catalog
        run: npm run authz:permission-catalog:check

      - name: Validate canonical role model
        run: npm run authz:role-model:check

      - name: Validate PBAC policy contracts
        run: npm run authz:policy-contract-check

      - name: Validate ABAC and Data Scope contracts
        run: npm run authz:data-scope-contract-check

      - name: Validate Data Scope migrations
        run: npm run authz:data-scope-migration-check

      - name: Validate Logto authorization contracts offline
        run: npm run logto:authz:contract-check

      - name: Run authorization security gate
        run: npm run authz:security-gate:check

      - name: Validate runtime authorization consistency
        run: npm run authz:runtime-contract-check

      - name: Run complete authorization matrix
        run: npm test


  module-control-plane-postgres:
    name: Module control plane PostgreSQL persistence gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: civitas_p3_005
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d civitas_p3_005"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install root dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then npm ci; else npm install --package-lock=false; fi

      - name: Install backend dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f backend/package-lock.json ]]; then npm --prefix backend ci; else npm --prefix backend install --package-lock=false; fi

      - name: Prepare Phase 3 PostgreSQL gate databases
        shell: bash
        run: |
          set -euo pipefail
          createdb -h localhost -U postgres civitas_p3_006 || true
          createdb -h localhost -U postgres civitas_p3_010 || true

      - name: Run PostgreSQL module control plane persistence gate
        env:
          DATABASE_URL: postgres://postgres@localhost:5432/civitas_p3_005
        run: npm run modules:p3-005:postgres-check

      - name: Run PostgreSQL module availability gate
        env:
          DATABASE_URL: postgres://postgres@localhost:5432/civitas_p3_006
        run: npm run modules:p3-006:postgres-check

      - name: Run PostgreSQL integration events gate
        env:
          DATABASE_URL: postgres://postgres@localhost:5432/civitas_p3_010
        run: npm run integration:p3-010:postgres-check
