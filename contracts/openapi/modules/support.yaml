paths:
  /o/{organizationId}/support/tickets:
    get:
      tags: [support]
      summary: Planned canonical read operation for support.tickets.
      operationId: supportTicketsList
      x-civitas-module: support
      x-civitas-capability: support.tickets
      x-civitas-route-id: support.tickets.read
      x-civitas-action-id: support.tickets.read
      x-civitas-surface: organization
      x-civitas-status: planned
      x-civitas-permission: support.tickets.read
      x-civitas-policies: [same-organization, membership-required, authorization-snapshot-current]
      x-civitas-audit: read
      x-civitas-idempotency: forbidden
      x-civitas-execution: synchronous
      parameters:
        - $ref: ../common/parameters.yaml#/components/parameters/OrganizationId
        - $ref: ../common/parameters.yaml#/components/parameters/Cursor
        - $ref: ../common/parameters.yaml#/components/parameters/Limit
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Canonical successful response.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TicketCollection' }
        '401': { $ref: ../common/responses.yaml#/components/responses/Unauthorized }
        '403': { $ref: ../common/responses.yaml#/components/responses/Forbidden }
components:
  securitySchemes:
    bearerAuth: { $ref: ../common/security.yaml#/components/securitySchemes/bearerAuth }
  schemas:
    Ticket:
      type: object
      required: [id]
      properties:
        id: { type: string }
        displayName: { type: string }
    TicketCollection:
      type: object
      required: [data, page, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Ticket' } }
        page: { $ref: ../common/schemas.yaml#/components/schemas/Page }
        meta: { $ref: ../common/schemas.yaml#/components/schemas/Meta }
