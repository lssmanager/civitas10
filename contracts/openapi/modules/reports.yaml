paths:
  /o/{organizationId}/reports/executive-summaries/current:
    get:
      tags: [reports]
      summary: Planned canonical read operation for reports.executive-summary.
      operationId: reportsExecutiveSummaryRead
      x-civitas-module: reports
      x-civitas-capability: reports.executive-summary
      x-civitas-route-id: reports.executive-summary.read
      x-civitas-action-id: reports.executive-summary.read
      x-civitas-surface: organization
      x-civitas-status: planned
      x-civitas-permission: analytics.reports.read
      x-civitas-policies: [same-organization, membership-required, authorization-snapshot-current]
      x-civitas-audit: read
      x-civitas-idempotency: forbidden
      x-civitas-execution: synchronous
      parameters:
        - $ref: ../common/parameters.yaml#/components/parameters/OrganizationId
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Canonical successful response.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExecutiveSummaryEnvelope' }
        '401': { $ref: ../common/responses.yaml#/components/responses/Unauthorized }
        '403': { $ref: ../common/responses.yaml#/components/responses/Forbidden }
components:
  securitySchemes:
    bearerAuth: { $ref: ../common/security.yaml#/components/securitySchemes/bearerAuth }
  schemas:
    ExecutiveSummary:
      type: object
      required: [id, generatedAt]
      properties:
        id: { type: string }
        generatedAt: { type: string, format: date-time }
    ExecutiveSummaryEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/ExecutiveSummary' }
        meta: { $ref: ../common/schemas.yaml#/components/schemas/Meta }
