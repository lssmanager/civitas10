components:
  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      description: Canonical Logto organization identifier resolved and validated by Civitas.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[A-Za-z0-9_-]+$'
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        maxLength: 2048
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 255
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
